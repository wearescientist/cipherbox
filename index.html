<!doctype html>
<html lang="zh-CN" data-theme="hacker">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>凭据工作台</title>
        <style>
            :root {
                --bg: #0b0f18;
                --bg2: #111827;
                --panel: rgba(18, 24, 36, 0.88);
                --panel2: rgba(15, 20, 30, 0.82);
                --line: rgba(120, 140, 180, 0.22);
                --line-strong: rgba(160, 185, 225, 0.42);
                --text: #eef3fb;
                --muted: #95a5bf;
                --accent: #f1f5fb;
                --accent2: #d9e6fb;
                --accentText: #0f1724;
                --danger: #ff8383;
                --dangerBg: rgba(255, 109, 109, 0.14);
                --success: #7ae7a7;
                --shadow: 0 12px 34px rgba(0, 0, 0, 0.26);
                --shadow-strong: 0 18px 46px rgba(0, 0, 0, 0.34);
                --radius: 16px;
                --radius-lg: 22px;
                --input-bg: rgba(8, 12, 19, 0.56);
                --input-focus: rgba(182, 204, 239, 0.55);
                --chip-bg: rgba(255, 255, 255, 0.05);
                --chip-hover: rgba(255, 255, 255, 0.09);
                --page-max: 1380px;
                --page-pad: 12px;
                --gap: 12px;
                --font-body:
                    Inter, system-ui, -apple-system, BlinkMacSystemFont,
                    "Segoe UI", sans-serif;
                --font-mono:
                    ui-monospace, SFMono-Regular, Menlo, Consolas,
                    "Liberation Mono", monospace;
                color-scheme: dark;
            }

            html,
            body {
                margin: 0;
                min-height: 100%;
            }
            * {
                box-sizing: border-box;
            }
            body {
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(255, 255, 255, 0.05),
                        transparent 34%
                    ),
                    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
                color: var(--text);
                font-family: var(--font-body);
                min-height: 100vh;
                position: relative;
                overflow-x: hidden;
            }
            body::before,
            body::after {
                content: "";
                position: fixed;
                inset: auto;
                pointer-events: none;
                z-index: 0;
            }
            body::before {
                top: -20vh;
                left: -8vw;
                width: 34vw;
                height: 34vw;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    rgba(255, 255, 255, 0.07),
                    transparent 65%
                );
                filter: blur(24px);
            }
            body::after {
                right: -10vw;
                bottom: -22vh;
                width: 36vw;
                height: 36vw;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    rgba(255, 255, 255, 0.05),
                    transparent 68%
                );
                filter: blur(26px);
            }

            button,
            input,
            textarea {
                font: inherit;
            }
            button {
                cursor: pointer;
            }
            input,
            textarea {
                width: 100%;
                background: var(--input-bg);
                border: 1px solid var(--line);
                color: var(--text);
                border-radius: 12px;
                padding: 10px 12px;
                outline: none;
                transition:
                    border-color 0.2s ease,
                    box-shadow 0.2s ease,
                    background 0.2s ease,
                    transform 0.2s ease;
            }
            input::placeholder,
            textarea::placeholder {
                color: color-mix(in srgb, var(--muted) 88%, transparent);
            }
            input:focus,
            textarea:focus {
                border-color: var(--input-focus);
                box-shadow: 0 0 0 3px
                    color-mix(in srgb, var(--input-focus) 24%, transparent);
            }
            textarea {
                resize: vertical;
                min-height: 154px;
            }
            .hidden {
                display: none !important;
            }

            .page {
                position: relative;
                z-index: 1;
                max-width: var(--page-max);
                margin: 0 auto;
                padding: var(--page-pad);
            }
            .topbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px 12px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: var(--radius-lg);
                padding: 10px 12px;
                box-shadow: var(--shadow);
                position: sticky;
                top: 10px;
                z-index: 12;
                backdrop-filter: blur(14px) saturate(125%);
                -webkit-backdrop-filter: blur(14px) saturate(125%);
            }
            .brand {
                display: flex;
                align-items: center;
                gap: 10px;
                min-width: 0;
            }
            .logo {
                width: 38px;
                height: 38px;
                border-radius: 13px;
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2)
                );
                color: var(--accentText);
                display: grid;
                place-items: center;
                font-weight: 900;
                font-size: 15px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.14);
            }
            .brand h1 {
                margin: 0;
                font-size: 16px;
                line-height: 1.15;
            }
            .brand p {
                margin: 2px 0 0;
                color: var(--muted);
                font-size: 11px;
                line-height: 1.35;
            }
            .topbar-right {
                display: flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .actions {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .btn {
                border: 1px solid var(--line);
                background: color-mix(in srgb, var(--panel2) 88%, transparent);
                color: var(--text);
                border-radius: 12px;
                padding: 9px 12px;
                min-height: 38px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                transition:
                    border-color 0.2s ease,
                    box-shadow 0.2s ease,
                    transform 0.2s ease,
                    background 0.2s ease,
                    color 0.2s ease;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            }
            .btn:hover {
                border-color: var(--line-strong);
                background: color-mix(
                    in srgb,
                    var(--chip-hover) 65%,
                    var(--panel2)
                );
                transform: translateY(-1px);
            }
            .btn.primary {
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2)
                );
                color: var(--accentText);
                font-weight: 800;
                border-color: color-mix(
                    in srgb,
                    var(--accent) 58%,
                    transparent
                );
            }
            .btn.danger {
                color: var(--danger);
                border-color: color-mix(
                    in srgb,
                    var(--danger) 35%,
                    transparent
                );
                background: var(--dangerBg);
            }
            .btn.small {
                min-height: 32px;
                padding: 7px 9px;
                font-size: 12px;
                border-radius: 10px;
            }

            .workspace {
                display: grid;
                grid-template-columns: 280px minmax(340px, 1fr) 330px;
                gap: var(--gap);
                margin-top: 12px;
            }
            .panel,
            .card {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow);
                overflow: hidden;
                backdrop-filter: blur(14px) saturate(120%);
                -webkit-backdrop-filter: blur(14px) saturate(120%);
            }
            .panel .head {
                padding: 14px 14px 0;
            }
            .panel .title {
                font-size: 14px;
                font-weight: 800;
                letter-spacing: 0.01em;
            }
            .panel .sub {
                font-size: 11px;
                color: var(--muted);
                margin-top: 4px;
                line-height: 1.45;
            }
            .panel .body {
                padding: 14px;
            }
            .panelHeadRow {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }
            .countPill,
            .miniPill {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 22px;
                padding: 0 8px;
                border-radius: 999px;
                border: 1px solid var(--line);
                background: var(--chip-bg);
                color: var(--muted);
                font-size: 11px;
                font-weight: 700;
            }
            .miniPill {
                padding: 5px 8px;
                min-height: 28px;
            }

            .auth {
                min-height: calc(100vh - 24px);
                display: grid;
                place-items: center;
            }
            .auth-shell {
                width: min(960px, 100%);
                display: grid;
                gap: 14px;
            }
            .auth-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .card {
                padding: 20px;
            }
            .card h2 {
                margin: 0;
                font-size: 21px;
            }
            .card p {
                margin: 8px 0 0;
                color: var(--muted);
                line-height: 1.65;
            }
            .stack {
                display: grid;
                gap: 10px;
            }
            .stackLg {
                display: grid;
                gap: 14px;
            }
            .authTop {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                flex-wrap: wrap;
                padding: 0 2px;
            }
            .authTitle {
                display: grid;
                gap: 4px;
            }
            .authTitle strong {
                font-size: 14px;
            }
            .authTitle span {
                font-size: 12px;
                color: var(--muted);
            }

            .type-tabs {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .type-tab {
                border: 1px solid var(--line);
                background: var(--chip-bg);
                border-radius: 12px;
                padding: 10px 8px;
                text-align: center;
                color: var(--muted);
                font-size: 12px;
                font-weight: 700;
                transition:
                    border-color 0.2s ease,
                    background 0.2s ease,
                    color 0.2s ease,
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
            }
            .type-tab:hover {
                border-color: var(--line-strong);
                transform: translateY(-1px);
            }
            .type-tab.active {
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2)
                );
                color: var(--accentText);
                border-color: color-mix(
                    in srgb,
                    var(--accent) 58%,
                    transparent
                );
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
            }
            .search {
                padding: 14px 14px 0;
            }
            .searchRow {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .searchRow input {
                flex: 1;
            }
            .search .countPill {
                flex-shrink: 0;
            }
            .list {
                display: grid;
                gap: 8px;
                max-height: calc(100vh - 248px);
                overflow: auto;
                padding-right: 2px;
                margin-top: 10px;
            }
            .list::-webkit-scrollbar,
            .pairList::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            .list::-webkit-scrollbar-thumb,
            .pairList::-webkit-scrollbar-thumb {
                background: color-mix(in srgb, var(--muted) 28%, transparent);
                border-radius: 999px;
            }
            .item {
                border: 1px solid var(--line);
                background: color-mix(in srgb, var(--panel2) 82%, transparent);
                border-radius: 14px;
                padding: 11px 12px;
                text-align: left;
                transition:
                    border-color 0.2s ease,
                    background 0.2s ease,
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            }
            .item:hover {
                border-color: var(--line-strong);
                transform: translateY(-1px);
            }
            .item.active {
                border-color: color-mix(
                    in srgb,
                    var(--accent) 48%,
                    var(--line)
                );
                background: color-mix(
                    in srgb,
                    var(--accent2) 14%,
                    var(--panel2)
                );
                box-shadow: 0 12px 22px rgba(0, 0, 0, 0.14);
            }
            .editorHead {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 2px 0;
            }
            .editorHead .title {
                font-size: 14px;
                font-weight: 800;
            }
            .item-title {
                font-size: 13px;
                font-weight: 800;
                line-height: 1.34;
                word-break: break-word;
            }
            .item-sub {
                margin-top: 4px;
                color: var(--muted);
                font-size: 11px;
            }
            .empty {
                border: 1px dashed
                    color-mix(in srgb, var(--muted) 36%, transparent);
                border-radius: 14px;
                padding: 22px 16px;
                text-align: center;
                color: var(--muted);
                background: color-mix(in srgb, var(--chip-bg) 80%, transparent);
                font-size: 13px;
                line-height: 1.6;
            }
            .detailTitle {
                font-size: 21px;
                font-weight: 900;
                line-height: 1.18;
                word-break: break-word;
            }
            .detailSub {
                margin-top: 6px;
                color: var(--muted);
                font-size: 12px;
            }
            .pair {
                display: grid;
                gap: 10px;
                margin-top: 14px;
            }
            .pairBox {
                border: 1px solid var(--line);
                background: color-mix(in srgb, var(--panel2) 82%, transparent);
                border-radius: 14px;
                padding: 12px;
            }
            .pairLabel {
                font-size: 10px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.14em;
                margin-bottom: 8px;
            }
            .secretRow {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto auto;
                gap: 8px;
                align-items: center;
            }
            .secretValue {
                min-height: 40px;
                border: 1px solid var(--line);
                background: color-mix(in srgb, var(--chip-bg) 66%, transparent);
                border-radius: 10px;
                padding: 9px 11px;
                display: flex;
                align-items: center;
                word-break: break-word;
                font-family: var(--font-mono);
                font-size: 12px;
            }
            .metaLine {
                margin-top: 12px;
                color: var(--muted);
                font-size: 11px;
            }
            .editorType {
                font-size: 12px;
                font-weight: 800;
                padding: 10px 12px;
                border: 1px solid var(--line);
                border-radius: 12px;
                background: color-mix(in srgb, var(--chip-bg) 80%, transparent);
            }
            .field label {
                display: block;
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 6px;
                font-weight: 700;
            }
            .modeRow {
                display: flex;
                gap: 8px;
            }
            .modeBtn {
                flex: 1;
                border: 1px solid var(--line);
                background: var(--chip-bg);
                border-radius: 12px;
                padding: 10px 12px;
                color: var(--muted);
                font-weight: 700;
                transition:
                    border-color 0.2s ease,
                    background 0.2s ease,
                    color 0.2s ease,
                    transform 0.2s ease;
            }
            .modeBtn:hover {
                border-color: var(--line-strong);
                transform: translateY(-1px);
            }
            .modeBtn.active {
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2)
                );
                color: var(--accentText);
                border-color: color-mix(
                    in srgb,
                    var(--accent) 58%,
                    transparent
                );
            }
            .hint {
                font-size: 11px;
                color: var(--muted);
                line-height: 1.6;
            }
            .status {
                margin-top: 10px;
                padding: 10px 12px;
                border: 1px solid var(--line);
                background: color-mix(in srgb, var(--chip-bg) 78%, transparent);
                border-radius: 12px;
                font-size: 12px;
                color: var(--text);
                line-height: 1.55;
            }
            .row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .toast {
                position: fixed;
                right: 14px;
                bottom: 14px;
                max-width: 380px;
                background: var(--panel);
                border: 1px solid var(--line-strong);
                border-radius: 14px;
                padding: 11px 12px;
                box-shadow: var(--shadow-strong);
                font-size: 12px;
                display: none;
                z-index: 20;
                backdrop-filter: blur(16px);
            }
            .themeSwitch {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                align-items: center;
            }
            .themeChip {
                min-height: 34px;
                padding: 0 10px;
                border-radius: 12px;
                border: 1px solid var(--line);
                background: var(--chip-bg);
                color: var(--muted);
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-size: 12px;
                font-weight: 800;
                transition: all 0.22s ease;
                box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            }
            .themeChip:hover {
                transform: translateY(-1px);
                border-color: var(--line-strong);
                background: var(--chip-hover);
                color: var(--text);
            }
            .themeChip.active {
                color: var(--accentText);
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2)
                );
                border-color: color-mix(
                    in srgb,
                    var(--accent) 58%,
                    transparent
                );
                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
            }
            .themeDot {
                width: 10px;
                height: 10px;
                border-radius: 999px;
                display: inline-block;
                box-shadow: 0 0 10px currentColor;
            }
            .footerNote {
                font-size: 11px;
                color: var(--muted);
                line-height: 1.5;
            }

            .kbd {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 18px;
                height: 18px;
                padding: 0 5px;
                border-radius: 6px;
                border: 1px solid var(--line);
                background: var(--chip-bg);
                font-size: 10px;
                font-weight: 800;
                color: var(--muted);
            }

            @media (max-width: 1180px) {
                .workspace {
                    grid-template-columns: 1fr;
                }
                .list {
                    max-height: none;
                }
                .auth-grid {
                    grid-template-columns: 1fr;
                }
                .topbar {
                    position: static;
                }
            }
            @media (max-width: 720px) {
                .page {
                    padding: 10px;
                }
                .searchRow {
                    flex-wrap: wrap;
                }
                .searchRow input {
                    min-width: 100%;
                }
                .topbar-right {
                    width: 100%;
                    justify-content: flex-start;
                }
                .actions {
                    width: 100%;
                }
                .actions .btn {
                    flex: 1;
                }
                .themeSwitch {
                    width: 100%;
                }
            }

            /* ===== 棱镜 ===== */
            html[data-theme="prism"] {
                --bg: #edf2f8;
                --bg2: #dfe8f2;
                --panel: rgba(255, 255, 255, 0.26);
                --panel2: rgba(255, 255, 255, 0.2);
                --line: rgba(255, 255, 255, 0.58);
                --line-strong: rgba(255, 255, 255, 0.9);
                --text: #1d2433;
                --muted: #5b6678;
                --accent: #ffffff;
                --accent2: #e8eff7;
                --accentText: #101826;
                --danger: #cb3c4d;
                --dangerBg: rgba(255, 94, 119, 0.12);
                --shadow:
                    0 8px 32px rgba(0, 0, 0, 0.1),
                    inset 0 1px 0 rgba(255, 255, 255, 0.8),
                    inset 0 -1px 0 rgba(0, 0, 0, 0.02);
                --shadow-strong:
                    0 20px 50px rgba(0, 0, 0, 0.12),
                    0 2px 8px rgba(255, 255, 255, 0.9) inset;
                --input-bg: rgba(255, 255, 255, 0.2);
                --input-focus: rgba(255, 255, 255, 0.8);
                --chip-bg: rgba(255, 255, 255, 0.22);
                --chip-hover: rgba(255, 255, 255, 0.34);
                color-scheme: light;
            }
            html[data-theme="prism"] body {
                background:
                    radial-gradient(
                        circle at 14% 18%,
                        rgba(255, 186, 214, 0.3),
                        transparent 22%
                    ),
                    radial-gradient(
                        circle at 86% 14%,
                        rgba(144, 214, 255, 0.24),
                        transparent 24%
                    ),
                    radial-gradient(
                        circle at 78% 84%,
                        rgba(201, 171, 255, 0.22),
                        transparent 20%
                    ),
                    linear-gradient(
                        135deg,
                        #f5f7fa 0%,
                        #e8ecf1 25%,
                        #dfe4ea 50%,
                        #e8ecf1 75%,
                        #f5f7fa 100%
                    );
            }
            html[data-theme="prism"] body::before {
                top: -18vh;
                left: -6vw;
                width: 30vw;
                height: 30vw;
                background: radial-gradient(
                    circle,
                    rgba(255, 255, 255, 0.85),
                    rgba(255, 255, 255, 0.08) 60%,
                    transparent 72%
                );
                filter: blur(8px);
            }
            html[data-theme="prism"] body::after {
                right: -4vw;
                bottom: -14vh;
                width: 28vw;
                height: 28vw;
                background: radial-gradient(
                    circle,
                    rgba(200, 225, 255, 0.45),
                    transparent 68%
                );
                filter: blur(16px);
            }
            html[data-theme="prism"] .panel,
            html[data-theme="prism"] .card,
            html[data-theme="prism"] .topbar,
            html[data-theme="prism"] .toast,
            html[data-theme="prism"] .item,
            html[data-theme="prism"] .pairBox,
            html[data-theme="prism"] .editorType,
            html[data-theme="prism"] .status,
            html[data-theme="prism"] .secretValue {
                background: rgba(255, 255, 255, 0.2) !important;
                backdrop-filter: blur(6px) saturate(180%);
                -webkit-backdrop-filter: blur(6px) saturate(180%);
                border: 1px solid rgba(255, 255, 255, 0.6);
                border-radius: 24px;
                box-shadow: var(--shadow);
                position: relative;
                overflow: hidden;
            }
            html[data-theme="prism"] .item,
            html[data-theme="prism"] .pairBox,
            html[data-theme="prism"] .editorType,
            html[data-theme="prism"] .status,
            html[data-theme="prism"] .secretValue {
                border-radius: 18px;
            }
            html[data-theme="prism"] .panel::after,
            html[data-theme="prism"] .card::after,
            html[data-theme="prism"] .topbar::after,
            html[data-theme="prism"] .item::after,
            html[data-theme="prism"] .pairBox::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent 0%,

        <script>
            (() => {
                const STORAGE_KEY = "credential-vault-simple-v2";
                const THEME_KEY = "credential-vault-theme-v1";
                const PBKDF2_ITERATIONS = 250000;
                const AUTO_LOCK_MS = 10 * 60 * 1000;
                const REVEAL_MS = 15000;
                const CLIPBOARD_CLEAR_MS = 30000;

                const TYPE_META = {
                    account_password: {
                        name: "账户 / 密码",
                        left: "账户",
                        right: "密码",
                    },
                    platform_api: {
                        name: "平台 / API",
                        left: "平台",
                        right: "API",
                    },
                    chain_address: {
                        name: "链 / 地址",
                        left: "链",
                        right: "地址",
                    },
                    platform_uid: {
                        name: "平台 / UID",
                        left: "平台",
                        right: "UID",
                    },
                };

                const THEME_META = {
                    prism: {
                        name: "棱镜",
                        dot: "linear-gradient(135deg,#f6d7ea,#caeaff)",
                    },
                    hacker: { name: "黑客", dot: "#39ff14" },
                    lightpollution: {
                        name: "光污染",
                        dot: "linear-gradient(135deg,#ff4a8d,#37e7f6)",
                    },
                };

                const state = {
                    unlocked: false,
                    sessionPassword: "",
                    data: { items: [] },
                    currentType: "account_password",
                    selectedId: null,
                    editingId: null,
                    mode: "single",
                    search: "",
                    revealLeft: false,
                    revealRight: false,
                    autoLockTimer: null,
                    revealTimerLeft: null,
                    revealTimerRight: null,
                    theme: "hacker",
                    lightpollutionSeed: "",
                };

                const el = {
                    authView: document.getElementById("authView"),
                    appView: document.getElementById("appView"),
                    createPassword: document.getElementById("createPassword"),
                    createPassword2: document.getElementById("createPassword2"),
                    unlockPassword: document.getElementById("unlockPassword"),
                    authStatus: document.getElementById("authStatus"),
                    typeTabs: document.getElementById("typeTabs"),
                    searchInput: document.getElementById("searchInput"),
                    itemList: document.getElementById("itemList"),
                    detailEmpty: document.getElementById("detailEmpty"),
                    detailWrap: document.getElementById("detailWrap"),
                    detailTitle: document.getElementById("detailTitle"),
                    detailSub: document.getElementById("detailSub"),
                    leftLabel: document.getElementById("leftLabel"),
                    rightLabel: document.getElementById("rightLabel"),
                    leftValue: document.getElementById("leftValue"),
                    rightValue: document.getElementById("rightValue"),
                    leftRevealBtn: document.getElementById("leftRevealBtn"),
                    rightRevealBtn: document.getElementById("rightRevealBtn"),
                    leftCopyBtn: document.getElementById("leftCopyBtn"),
                    rightCopyBtn: document.getElementById("rightCopyBtn"),
                    detailMeta: document.getElementById("detailMeta"),
                    editorTypeToggle:
                        document.getElementById("editorTypeToggle"),
                    singleModeBtn: document.getElementById("singleModeBtn"),
                    batchModeBtn: document.getElementById("batchModeBtn"),
                    singlePane: document.getElementById("singlePane"),
                    batchPane: document.getElementById("batchPane"),
                    singleLeftLabel: document.getElementById("singleLeftLabel"),
                    singleRightLabel:
                        document.getElementById("singleRightLabel"),
                    singleLeftInput: document.getElementById("singleLeftInput"),
                    singleRightInput:
                        document.getElementById("singleRightInput"),
                    batchHint: document.getElementById("batchHint"),
                    batchInput: document.getElementById("batchInput"),
                    appStatus: document.getElementById("appStatus"),
                    backupFileInput: document.getElementById("backupFileInput"),
                    toast: document.getElementById("toast"),
                    listCount: document.getElementById("listCount"),
                };

                function now() {
                    return Date.now();
                }
                function makeId() {
                    return `${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
                }
                function mask(value) {
                    if (!value) return "-";
                    return "•".repeat(Math.max(8, Math.min(24, value.length)));
                }
                function fmt(ts) {
                    if (!ts) return "-";
                    try {
                        return new Date(ts).toLocaleString();
                    } catch {
                        return "-";
                    }
                }
                function showStatus(msg, auth = false) {
                    const target = auth ? el.authStatus : el.appStatus;
                    target.textContent = msg;
                    target.classList.remove("hidden");
                }
                function clearStatus(auth = false) {
                    const target = auth ? el.authStatus : el.appStatus;
                    target.textContent = "";
                    target.classList.add("hidden");
                }
                function showToast(msg) {
                    el.toast.textContent = msg;
                    el.toast.style.display = "block";
                    clearTimeout(showToast.timer);
                    showToast.timer = setTimeout(() => {
                        el.toast.style.display = "none";
                    }, 2400);
                }

                function toggleThemeActive(theme) {
                    document.querySelectorAll(".themeChip").forEach((btn) => {
                        btn.classList.toggle(
                            "active",
                            btn.getAttribute("data-theme") === theme,
                        );
                    });
                }
                function loadTheme() {
                    const saved = localStorage.getItem(THEME_KEY);
                    state.theme = THEME_META[saved] ? saved : "hacker";
                    applyTheme(state.theme, true);
                }
                function saveTheme(theme) {
                    localStorage.setItem(THEME_KEY, theme);
                }
                function applyTheme(theme, silent = false) {
                    if (!THEME_META[theme]) return;
                    state.theme = theme;
                    if (
                        theme === "lightpollution" ||
                        !state.lightpollutionSeed
                    ) {
                        state.lightpollutionSeed = `${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
                    }
                    document.documentElement.setAttribute("data-theme", theme);
                    saveTheme(theme);
                    toggleThemeActive(theme);
                    syncThemeVisuals();
                    if (!silent)
                        showToast(`已切换到 ${THEME_META[theme].name}`);
                }
                // 静态主题按钮点击绑定
                document.querySelectorAll(".themeChip").forEach((btn) => {
                    btn.addEventListener("click", () => {
                        const theme = btn.getAttribute("data-theme");
                        if (state.theme === theme) return;
                        applyTheme(theme);
                    });
                });

                function hashString(str) {
                    let hash = 2166136261;
                    for (let i = 0; i < str.length; i++) {
                        hash ^= str.charCodeAt(i);
                        hash = Math.imul(hash, 16777619);
                    }
                    return hash >>> 0;
                }
                function hslToRgb(h, s, l) {
                    h = ((h % 360) + 360) % 360;
                    s /= 100;
                    l /= 100;
                    const c = (1 - Math.abs(2 * l - 1)) * s;
                    const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
                    const m = l - c / 2;
                    let r = 0,
                        g = 0,
                        b = 0;
                    if (h < 60) [r, g, b] = [c, x, 0];
                    else if (h < 120) [r, g, b] = [x, c, 0];
                    else if (h < 180) [r, g, b] = [0, c, x];
                    else if (h < 240) [r, g, b] = [0, x, c];
                    else if (h < 300) [r, g, b] = [x, 0, c];
                    else [r, g, b] = [c, 0, x];
                    return {
                        r: Math.round((r + m) * 255),
                        g: Math.round((g + m) * 255),
                        b: Math.round((b + m) * 255),
                    };
                }
                const LIGHTPOLLUTION_PALETTE = [
                    { hex: "#00f6ff", rgb: "0,246,255" },
                    { hex: "#ff00e5", rgb: "255,0,229" },
                    { hex: "#39ff14", rgb: "57,255,20" },
                    { hex: "#ffe600", rgb: "255,230,0" },
                    { hex: "#ff8a00", rgb: "255,138,0" },
                    { hex: "#8b5cf6", rgb: "139,92,246" },
                    { hex: "#ff1b6b", rgb: "255,27,107" },
                    { hex: "#00ff95", rgb: "0,255,149" },
                ];
                function neonFromSeed(seed, offset = 0) {
                    const hash = hashString(
                        `${state.lightpollutionSeed}|${seed}|${offset}`,
                    );
                    return LIGHTPOLLUTION_PALETTE[
                        hash % LIGHTPOLLUTION_PALETTE.length
                    ];
                }
                function paintNeonSet(selector, assigner) {
                    document
                        .querySelectorAll(selector)
                        .forEach((node, index) => assigner(node, index));
                }
                function applyLightpollutionChaos() {
                    const root1 = neonFromSeed("root", 1);
                    const root2 = neonFromSeed("root", 2);
                    const root3 = neonFromSeed("root", 3);
                    const root = document.documentElement;
                    root.style.setProperty("--lp-root1", root1.hex);
                    root.style.setProperty("--lp-root2", root2.hex);
                    root.style.setProperty("--lp-root3", root3.hex);
                    root.style.setProperty("--lp-root1-rgb", root1.rgb);
                    root.style.setProperty("--lp-root2-rgb", root2.rgb);
                    root.style.setProperty("--lp-root3-rgb", root3.rgb);

                    paintNeonSet(
                        ".btn, .type-tab, .modeBtn, .themeChip",
                        (node, index) => {
                            const key = `${node.textContent.trim()}|${node.className}|${index}`;
                            const c1 = neonFromSeed(key, 11);
                            const c2 = neonFromSeed(key, 17);
                            node.style.setProperty("--lp-btn-rgb", c1.rgb);
                            node.style.setProperty("--lp-btn-rgb-2", c2.rgb);
                        },
                    );

                    paintNeonSet(
                        ".panel, .card, .topbar, .toast",
                        (node, index) => {
                            const key = `${node.className}|${node.textContent.trim().slice(0, 48)}|${index}`;
                            const c1 = neonFromSeed(key, 23);
                            const c2 = neonFromSeed(key, 29);
                            node.style.setProperty("--lp-card-rgb", c1.rgb);
                            node.style.setProperty("--lp-card-rgb-2", c2.rgb);
                        },
                    );

                    paintNeonSet(
                        ".item, .pairBox, .editorType, .status, .secretValue",
                        (node, index) => {
                            const key = `${node.className}|${node.textContent.trim().slice(0, 48)}|inner|${index}`;
                            const c1 = neonFromSeed(key, 41);
                            const c2 = neonFromSeed(key, 47);
                            node.style.setProperty("--lp-card-rgb", c1.rgb);
                            node.style.setProperty("--lp-card-rgb-2", c2.rgb);
                        },
                    );

                    paintNeonSet("input, textarea", (node, index) => {
                        const key = `${node.id || node.placeholder || "field"}|${index}`;
                        const c1 = neonFromSeed(key, 31);
                        node.style.setProperty("--lp-input-rgb", c1.rgb);
                    });

                    const logo = document.querySelector(".logo");
                    if (logo) {
                        const c1 = neonFromSeed("logo", 37);
                        const c2 = neonFromSeed("logo", 41);
                        const c3 = neonFromSeed("logo", 43);
                        logo.style.setProperty("--lp-root1", c1.hex);
                        logo.style.setProperty("--lp-root2", c2.hex);
                        logo.style.setProperty("--lp-root3", c3.hex);
                        root.style.setProperty("--lp-root1", c1.hex);
                        root.style.setProperty("--lp-root2", c2.hex);
                        root.style.setProperty("--lp-root3", c3.hex);
                        root.style.setProperty("--lp-root1-rgb", c1.rgb);
                        root.style.setProperty("--lp-root2-rgb", c2.rgb);

                function bytesToBase64(bytes) {
                    let binary = "";
                    const chunk = 0x8000;
                    for (let i = 0; i < bytes.length; i += chunk)
                        binary += String.fromCharCode(
                            ...bytes.subarray(i, i + chunk),
                        );
                    return btoa(binary);
                }
                function base64ToBytes(base64) {
                    const binary = atob(base64);
                    const out = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++)
                        out[i] = binary.charCodeAt(i);
                    return out;
                }
                async function deriveKey(password, salt) {
                    const keyMaterial = await crypto.subtle.importKey(
                        "raw",
                        new TextEncoder().encode(password),
                        { name: "PBKDF2" },
                        false,
                        ["deriveKey"],
                    );
                    return crypto.subtle.deriveKey(
                        {
                            name: "PBKDF2",
                            salt,
                            iterations: PBKDF2_ITERATIONS,
                            hash: "SHA-256",
                        },
                        keyMaterial,
                        { name: "AES-GCM", length: 256 },
                        false,
                        ["encrypt", "decrypt"],
                    );
                }
                async function encryptPayload(payload, password) {
                    const salt = crypto.getRandomValues(new Uint8Array(16));
                    const iv = crypto.getRandomValues(new Uint8Array(12));
                    const key = await deriveKey(password, salt);
                    const encoded = new TextEncoder().encode(
                        JSON.stringify(payload),
                    );
                    const cipher = await crypto.subtle.encrypt(
                        { name: "AES-GCM", iv },
                        key,
                        encoded,
                    );
                    return {
                        version: 2,
                        salt: bytesToBase64(salt),
                        iv: bytesToBase64(iv),
                        ciphertext: bytesToBase64(new Uint8Array(cipher)),
                        updatedAt: now(),
                    };
                }
                async function decryptPayload(blob, password) {
                    const key = await deriveKey(
                        password,
                        base64ToBytes(blob.salt),
                    );
                    const plain = await crypto.subtle.decrypt(
                        { name: "AES-GCM", iv: base64ToBytes(blob.iv) },
                        key,
                        base64ToBytes(blob.ciphertext),
                    );
                    return JSON.parse(new TextDecoder().decode(plain));
                }
                function loadVaultBlob() {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return null;
                    try {
                        return JSON.parse(raw);
                    } catch {
                        return null;
                    }
                }
                async function persist() {
                    if (!state.sessionPassword) return;
                    const blob = await encryptPayload(
                        state.data,
                        state.sessionPassword,
                    );
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(blob));
                }
                async function createVault() {
                    const p1 = el.createPassword.value;
                    const p2 = el.createPassword2.value;
                    if (!p1 || p1.length < 8)
                        return showStatus("主密码至少 8 位。", true);
                    if (p1 !== p2)
                        return showStatus("两次主密码不一致。", true);
                    state.data = { items: [] };
                    state.sessionPassword = p1;
                    await persist();
                    el.createPassword.value = "";
                    el.createPassword2.value = "";
                    unlockIntoApp();
                }
                async function unlockVault() {
                    const password = el.unlockPassword.value;
                    const blob = loadVaultBlob();
                    if (!blob) return showStatus("未找到本地保险库。", true);
                    try {
                        const data = await decryptPayload(blob, password);
                        state.data =
                            data && Array.isArray(data.items)
                                ? data
                                : { items: [] };
                        state.sessionPassword = password;
                        el.unlockPassword.value = "";
                        unlockIntoApp();
                    } catch {
                        showStatus("主密码错误或备份已损坏。", true);
                    }
                }
                function unlockIntoApp() {

                function isDuplicate(left, right, excludeId) {
                    return (state.data.items || []).some(

                async function saveSingle() {

                    if (isDuplicate(left, right, state.editingId)) {

                    if (state.editingId) {

                function parseBatchLine(line) {
                    const trimmed = line.trim();
                    if (!trimmed) return null;
                    const rules = [/\t+/, /\s*\|\s*/, /\s*----\s*/, /\s*,\s*/];
                    for (const re of rules) {
                        const parts = trimmed.split(re);
                        if (parts.length >= 2)
                            return [
                                parts[0].trim(),
                                parts.slice(1).join(" ").trim(),
                            ];
                    }
                    return null;
                }

                async function importBatch() {
                    const text = el.batchInput.value;
                    const lines = text
                        .split(/\r?\n/)
                        .map((s) => s.trim())
                        .filter(Boolean);
                    if (!lines.length) return showStatus("没有可导入的内容。");
                    let added = 0;
                    let skipped = 0;
                    const seen = new Set(
                        state.data.items
                            .filter((x) => x.type === state.currentType)
                            .map((x) => `${x.left}__${x.right}`),
                    );
                    for (const line of lines) {
                        const pair = parseBatchLine(line);
                        if (!pair || !pair[0] || !pair[1]) {
                            skipped++;
                            continue;
                        }
                        const key = `${pair[0]}__${pair[1]}`;
                        if (seen.has(key)) {
                            skipped++;
                            continue;
                        }
                        seen.add(key);
                        state.data.items.unshift({
                            id: makeId(),
                            type: state.currentType,
                            left: pair[0],
                            right: pair[1],
                            createdAt: now(),
                            updatedAt: now(),
                        });
                        added++;
                    }
                    await persist();
                    renderAll();
                    showStatus(
                        `批量导入完成：新增 ${added}，跳过 ${skipped}。`,
                    );
                    if (added) el.batchInput.value = "";
                }

                async function exportBackup() {
                    const blob = loadVaultBlob();
                    if (!blob) return showStatus("没有可导出的内容。");
                    const file = new Blob([JSON.stringify(blob, null, 2)], {
                        type: "application/json",
                    });
                    const url = URL.createObjectURL(file);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `credential-vault-backup-${new Date().toISOString().slice(0, 10)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast("已导出加密备份。");
                }

                function importBackupFromFile(file) {
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = () => {
                        try {
                            const parsed = JSON.parse(
                                String(reader.result || "{}"),
                            );
                            if (
                                !parsed.salt ||
                                !parsed.iv ||
                                !parsed.ciphertext
                            )
                                throw new Error("bad");
                            localStorage.setItem(
                                STORAGE_KEY,
                                JSON.stringify(parsed),
                            );
                            if (state.unlocked)
                                lockVault("已导入备份，请重新解锁。");
                            else
                                showStatus(
                                    "已导入备份，请输入原主密码解锁。",
                                    true,
                                );
                        } catch {
                            if (state.unlocked) showStatus("备份文件无效。");
                            else showStatus("备份文件无效。", true);
                        }
                        el.backupFileInput.value = "";
                    };
                    reader.readAsText(file);
                }

                        showToast(`${label} 已复制。`);

                            renderDetail();

                });
                el.rightCopyBtn.addEventListener("click", () => {
                    const item = getItem(state.selectedId);
                    if (item)
                        copyWithClear(item.right, TYPE_META[item.type].right);
                });

                loadTheme();

                if (loadVaultBlob()) {
                    showStatus("检测到本地保险库，可直接解锁。", true);
                }
            })();
        </script>
    </body>
</html>
